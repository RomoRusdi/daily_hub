<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1613" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <title>Hub — Daily Command Center</title>
    <!-- Apply the saved theme before React paints, so the splash/loader and the
         first frame match the user's choice (no light-mode flash in dark mode).
         Mirrors the logic in src/hooks/useTheme.js. -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('hub:theme'))
          var value = stored == null ? 'system' : stored
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var isDark = value === 'dark' || (value === 'system' && prefersDark)
          document.documentElement.classList.toggle('dark', isDark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
